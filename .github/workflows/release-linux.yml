name: Release Linux & macOS binaries

# Triggered when a GitHub Release is published. Builds .so binaries for
# Linux glibc (x86_64 + arm64) and macOS (Apple Silicon arm64) at the PHP
# versions in the matrix (NTS only -- ZTS lives in the Windows lane),
# uploads each as a release asset via php/pie-ext-binary-builder using
# PIE's pre-packaged-binary naming convention.
#
# workflow_dispatch builds the source on each OS/arch as a pre-tag
# validation gate; the upload only runs on release:[published], so a
# dispatch is build-only and safe to run against a branch.
#
# macOS Intel (macos-13) is intentionally absent -- GitHub's Intel runner
# pool is too contended to ship reliably, and macOS 26 drops Intel anyway.
# Linux musl (Alpine) is intentionally absent. Both get PIE's
# composer-default source-build fallback.
#
# composer.json declares
#   "download-url-method": ["pre-packaged-binary", "composer-default"]
# so PIE prefers the prebuilt asset and falls back to source-build when no
# asset matches (older PHP, Intel macOS, Alpine, other arches).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to build + upload assets to (e.g. backfilling a tag cut before this workflow existed). Leave blank for build-only validation of the current branch.'
        required: false
        default: ''

jobs:
  build:
    name: ${{ matrix.os }} php ${{ matrix.php }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-24.04 (x86_64), ubuntu-24.04-arm (arm64),
        # macos-14 (Apple Silicon arm64). Pinned over `*-latest` to avoid
        # silent runner shifts that would change the toolchain / glibc
        # baseline on published release assets without a repo diff.
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-14
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@v6
        with:
          # Build the release's tagged source: the tag on a release event, or
          # the dispatch input when backfilling. Blank (plain dispatch) checks
          # out the triggering branch for build-only validation.
          ref: ${{ github.event.release.tag_name || inputs.release_tag }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize
          coverage: none

      # Test this exact checkout before any upload. On a plain dispatch this is
      # the complete validation path; release/backfill runs package only after it
      # passes.
      - name: Build and test tagged source
        run: |
          set -euo pipefail
          phpize
          ./configure --enable-phonetic --enable-phonetic-dev
          make -j"$(getconf _NPROCESSORS_ONLN)"
          export TEST_PHP_EXECUTABLE=$(command -v php)
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/phonetic.so"
          export NO_INTERACTION=1
          php $TEST_PHP_ARGS -r 'exit(extension_loaded("phonetic") ? 0 : 1);' \
            || { echo "::error::phonetic extension failed to load"; exit 1; }
          RESULT=$(php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/ 2>&1)
          echo "$RESULT"
          num() { awk -v k="$1" '$0 ~ ("^Tests " k) { for (i = 1; i <= NF; i++) if ($i ~ /^[0-9]+$/) { print $i; exit } }' <<<"$RESULT"; }
          PASSED=$(num passed); FAILED=$(num failed); SKIPPED=$(num skipped)
          BORKED=$(num borked); LEAKED=$(num leaked)
          : "${PASSED:=0}" "${FAILED:=0}" "${SKIPPED:=0}" "${BORKED:=0}" "${LEAKED:=0}"
          if [ "$FAILED" -gt 0 ] || [ "$BORKED" -gt 0 ] || [ "$LEAKED" -gt 0 ]; then
            echo "::error::failed=$FAILED borked=$BORKED leaked=$LEAKED"; exit 1
          fi
          if [ "$PASSED" -eq 0 ] || [ "$SKIPPED" -gt 0 ]; then
            echo "::error::suite not effective: passed=$PASSED skipped=$SKIPPED"; exit 1
          fi

      # pie-ext-binary-builder rebuilds in this same workspace without a clean
      # step, so its make would silently reuse the objects compiled above with
      # the test configure's flags instead of the packaging configure's. Drop
      # every build artifact so the shipped binary is compiled from scratch
      # under exactly the flags the builder requests.
      - name: Clean test-build artifacts
        run: git clean -xdf .

      # Real build + upload: on a published release, or a dispatch that names
      # an existing release tag to attach assets to.
      - name: Build and upload prebuilt binary
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: php/pie-ext-binary-builder@0.0.3
        with:
          release-tag: ${{ github.event.release.tag_name || inputs.release_tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          configure-flags: '--enable-phonetic'
