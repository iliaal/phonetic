name: Release Linux & macOS binaries

# Triggered when a GitHub Release is published. Builds .so binaries for
# Linux glibc (x86_64 + arm64) and macOS (Apple Silicon arm64) at the PHP
# versions in the matrix (NTS only -- ZTS lives in the Windows lane),
# uploads each as a release asset via php/pie-ext-binary-builder using
# PIE's pre-packaged-binary naming convention.
#
# workflow_dispatch builds the source on each OS/arch as a pre-tag
# validation gate; the upload only runs on release:[published], so a
# dispatch is build-only and safe to run against a branch.
#
# macOS Intel (macos-13) is intentionally absent -- GitHub's Intel runner
# pool is too contended to ship reliably, and macOS 26 drops Intel anyway.
# Linux musl (Alpine) is intentionally absent. Both get PIE's
# composer-default source-build fallback.
#
# composer.json declares
#   "download-url-method": ["pre-packaged-binary", "composer-default"]
# so PIE prefers the prebuilt asset and falls back to source-build when no
# asset matches (older PHP, Intel macOS, Alpine, other arches).

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} php ${{ matrix.php }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-24.04 (x86_64), ubuntu-24.04-arm (arm64),
        # macos-14 (Apple Silicon arm64). Pinned over `*-latest` to avoid
        # silent runner shifts that would change the toolchain / glibc
        # baseline on published release assets without a repo diff.
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-14
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize
          coverage: none

      # Dispatch path: prove the source compiles on this OS/arch only. The
      # real build+upload runs on release:[published] below.
      - name: Validate build (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          phpize
          ./configure --enable-phonetic
          make -j"$(getconf _NPROCESSORS_ONLN)"

      - name: Build and upload prebuilt binary
        if: github.event_name == 'release'
        uses: php/pie-ext-binary-builder@0.0.3
        with:
          release-tag: ${{ github.event.release.tag_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          configure-flags: '--enable-phonetic'
