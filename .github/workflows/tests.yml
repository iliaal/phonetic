name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate composer.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none
      - run: composer validate --strict

  # PIE install-path smoke against a path repository pointing at this checkout.
  # Catches composer.json php-ext metadata drift and configure-options the
  # config.m4 doesn't actually understand.
  pie-smoke:
    name: PIE install smoke
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: phpize, php-config
          coverage: none
      - name: Install PIE build prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends bison libtool-bin
      - name: Download PIE
        run: |
          curl -fsSL -o /tmp/pie.phar https://github.com/php/pie/releases/latest/download/pie.phar
          chmod +x /tmp/pie.phar
      - name: PIE build smoke
        run: |
          php /tmp/pie.phar repository:add path .
          php /tmp/pie.phar build iliaal/phonetic:*@dev --enable-phonetic

  linux:
    name: PHP ${{ matrix.php }} - Linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize, php-config

      - name: Build extension
        run: |
          phpize
          ./configure --enable-phonetic --enable-phonetic-dev
          WARNINGS=$(make -j$(nproc) 2>&1 | tee /dev/stderr | grep -c 'warning:' || true)
          if [ "$WARNINGS" -gt 0 ]; then
            echo "::error::Build produced $WARNINGS warning(s)"
            exit 1
          fi

      - name: Run tests
        run: |
          set -euo pipefail
          export TEST_PHP_EXECUTABLE=$(which php)
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/phonetic.so"
          export NO_INTERACTION=1
          # Every .phpt has `--EXTENSIONS-- phonetic`, so a load failure SKIPs the
          # whole suite and run-tests still exits 0. Assert the extension loads,
          # then fail on any skip/bork/leak/failure or an empty pass count.
          php $TEST_PHP_ARGS -r 'exit(extension_loaded("phonetic") ? 0 : 1);' \
            || { echo "::error::phonetic extension failed to load"; exit 1; }
          RESULT=$(php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/ 2>&1)
          echo "$RESULT"
          # Portable parse: BSD grep (macOS) has no -P/\K, so grep -oP would
          # yield empty counts and trip the "not effective" guard on a good run.
          num() { awk -v k="$1" '$0 ~ ("^Tests " k) { for (i = 1; i <= NF; i++) if ($i ~ /^[0-9]+$/) { print $i; exit } }' <<<"$RESULT"; }
          PASSED=$(num passed); FAILED=$(num failed); SKIPPED=$(num skipped)
          BORKED=$(num borked); LEAKED=$(num leaked)
          : "${PASSED:=0}" "${FAILED:=0}" "${SKIPPED:=0}" "${BORKED:=0}" "${LEAKED:=0}"
          echo "passed=$PASSED failed=$FAILED skipped=$SKIPPED borked=$BORKED leaked=$LEAKED"
          if [ "$FAILED" -gt 0 ] || [ "$BORKED" -gt 0 ] || [ "$LEAKED" -gt 0 ]; then
            echo "::error::failed=$FAILED borked=$BORKED leaked=$LEAKED"; exit 1
          fi
          if [ "$PASSED" -eq 0 ] || [ "$SKIPPED" -gt 0 ]; then
            echo "::error::suite not effective: passed=$PASSED skipped=$SKIPPED"; exit 1
          fi

  macos:
    name: PHP ${{ matrix.php }} - macOS
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize, php-config

      - name: Build extension
        run: |
          phpize
          ./configure --enable-phonetic --enable-phonetic-dev
          make -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: |
          set -euo pipefail
          export TEST_PHP_EXECUTABLE=$(which php)
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/phonetic.so"
          export NO_INTERACTION=1
          php $TEST_PHP_ARGS -r 'exit(extension_loaded("phonetic") ? 0 : 1);' \
            || { echo "::error::phonetic extension failed to load"; exit 1; }
          RESULT=$(php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/ 2>&1)
          echo "$RESULT"
          # Portable parse: BSD grep (macOS) has no -P/\K, so grep -oP would
          # yield empty counts and trip the "not effective" guard on a good run.
          num() { awk -v k="$1" '$0 ~ ("^Tests " k) { for (i = 1; i <= NF; i++) if ($i ~ /^[0-9]+$/) { print $i; exit } }' <<<"$RESULT"; }
          PASSED=$(num passed); FAILED=$(num failed); SKIPPED=$(num skipped)
          BORKED=$(num borked); LEAKED=$(num leaked)
          : "${PASSED:=0}" "${FAILED:=0}" "${SKIPPED:=0}" "${BORKED:=0}" "${LEAKED:=0}"
          echo "passed=$PASSED failed=$FAILED skipped=$SKIPPED borked=$BORKED leaked=$LEAKED"
          if [ "$FAILED" -gt 0 ] || [ "$BORKED" -gt 0 ] || [ "$LEAKED" -gt 0 ]; then
            echo "::error::failed=$FAILED borked=$BORKED leaked=$LEAKED"; exit 1
          fi
          if [ "$PASSED" -eq 0 ] || [ "$SKIPPED" -gt 0 ]; then
            echo "::error::suite not effective: passed=$PASSED skipped=$SKIPPED"; exit 1
          fi

  asan:
    name: PHP ${{ matrix.php }} - ASAN
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    env:
      ASAN_OPTIONS: exitcode=139:verify_asan_link_order=0:detect_odr_violation=0:detect_leaks=1
      LSAN_OPTIONS: suppressions=${{ github.workspace }}/.github/lsan-suppressions.txt:print_suppressions=0
      UBSAN_OPTIONS: print_stacktrace=1
      USE_ZEND_ALLOC: 0
      USE_TRACKED_ALLOC: 1

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y llvm clang re2c bison autoconf

      # -shared-libasan links binaries against clang's ASAN runtime .so; each ASAN
      # step sets LD_LIBRARY_PATH to this dir so configure's run-test and the
      # instrumented php binary can resolve it (else configure dies at "whether the
      # C compiler works" with "cannot run C compiled programs").
      - name: Resolve clang runtime dir
        id: clang_rt
        run: echo "dir=$(clang -print-runtime-dir)" >> "$GITHUB_OUTPUT"

      - name: Build PHP with ASAN (-shared-libasan keeps __cxa_throw resolvable across dlopen)
        env:
          LD_LIBRARY_PATH: ${{ steps.clang_rt.outputs.dir }}
        run: |
          git clone --depth=1 --branch=PHP-${{ matrix.php }} https://github.com/php/php-src.git /tmp/php-src
          cd /tmp/php-src
          ./buildconf --force
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined -shared-libasan" \
          ./configure \
            --enable-debug \
            --disable-zts \
            --disable-all \
            --enable-cli \
            --prefix=/tmp/php-asan
          make -j$(nproc)
          make install

      - name: Build extension with ASAN
        env:
          LD_LIBRARY_PATH: ${{ steps.clang_rt.outputs.dir }}
        run: |
          export PATH="/tmp/php-asan/bin:$PATH"
          phpize
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          CXXFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined -shared-libasan" \
          ./configure \
            --enable-phonetic --enable-phonetic-dev \
            --with-php-config=/tmp/php-asan/bin/php-config
          make -j$(nproc)

      - name: Run tests under ASAN
        env:
          LD_LIBRARY_PATH: ${{ steps.clang_rt.outputs.dir }}
        run: |
          set -euo pipefail
          export TEST_PHP_EXECUTABLE=/tmp/php-asan/bin/php
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/phonetic.so"
          export NO_INTERACTION=1
          /tmp/php-asan/bin/php $TEST_PHP_ARGS -r 'exit(extension_loaded("phonetic") ? 0 : 1);' \
            || { echo "::error::phonetic extension failed to load under ASAN"; exit 1; }
          # Capture via redirect (not `| tee ... || true`, which masked the exit
          # status and let an all-skip run pass green under ASAN).
          /tmp/php-asan/bin/php run-tests.php --show-diff --asan -g FAIL,BORK,LEAK,XLEAK tests/ > /tmp/test-output.txt 2>&1 || true
          cat /tmp/test-output.txt
          num() { awk -v k="$1" '$0 ~ ("^Tests " k) { for (i = 1; i <= NF; i++) if ($i ~ /^[0-9]+$/) { print $i; exit } }' /tmp/test-output.txt; }
          PASSED=$(num passed); FAILED=$(num failed); SKIPPED=$(num skipped)
          BORKED=$(num borked); LEAKED=$(num leaked)
          : "${PASSED:=0}" "${FAILED:=0}" "${SKIPPED:=0}" "${BORKED:=0}" "${LEAKED:=0}"
          echo "passed=$PASSED failed=$FAILED skipped=$SKIPPED borked=$BORKED leaked=$LEAKED"
          if [ "$FAILED" -gt 0 ] || [ "$BORKED" -gt 0 ] || [ "$LEAKED" -gt 0 ]; then
            echo "::error::ASAN failed=$FAILED borked=$BORKED leaked=$LEAKED"; exit 1
          fi
          if [ "$PASSED" -eq 0 ] || [ "$SKIPPED" -gt 0 ]; then
            echo "::error::ASAN suite not effective: passed=$PASSED skipped=$SKIPPED"; exit 1
          fi

  # Mirrors the release-windows.yml matrix (same php-version-list, so the same
  # MSVC toolsets: VS2019 for <=8.3, VS2022 for >=8.4) and runs the test suite,
  # so a Windows compile/test break surfaces on push instead of at release time
  # when the asset upload is all-or-nothing.
  windows-matrix:
    name: Resolve Windows matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: matrix
        uses: php/php-windows-builder/extension-matrix@v1
        with:
          php-version-list: '8.1, 8.2, 8.3, 8.4, 8.5'

  windows:
    name: Windows ${{ matrix.php-version }} ${{ matrix.ts }} ${{ matrix.arch }}
    needs: windows-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.windows-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: php/php-windows-builder/extension@v1
        with:
          php-version: ${{ matrix.php-version }}
          arch: ${{ matrix.arch }}
          ts: ${{ matrix.ts }}
          run-tests: 'true'
